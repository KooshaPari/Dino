version: 2
updates:
  # NuGet dependencies with grouped updates
  - package-ecosystem: "nuget"
    directory: "/src"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      microsoft:
        patterns:
          - "Microsoft.*"
          - "System.*"
      testing:
        patterns:
          - "xunit*"
          - "FluentAssertions"
          - "Moq"
          - "coverlet*"
      avalonia:
        patterns:
          - "Avalonia*"
      stryker:
        patterns:
          - "dotnet-stryker"
    ignore:
      - dependency-name: "Unity.*"
        update-types: ["version-update:semver-major"]
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "nuget"
      - "automated"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
      - "automated"
