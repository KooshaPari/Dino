name: Nightly Fuzz

on:
  schedule:
    - cron: '0 2 * * *'  # 2am UTC nightly
  workflow_dispatch:

jobs:
  property-tests:
    name: FsCheck Property Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore dependencies
        run: dotnet restore src/DINOForge.CI.sln

      - name: Build
        run: dotnet build src/DINOForge.CI.sln --no-restore --configuration Release

      - name: Run property tests
        run: |
          dotnet test src/DINOForge.CI.sln \
            --no-build \
            --filter "Category=Property" \
            --configuration Release \
            --logger "trx;LogFileName=property-results.trx" \
            --results-directory TestResults/Property \
            2>&1

      - name: Upload property test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: property-test-results
          path: TestResults/Property/

  fuzz-smoke:
    name: Fuzz Target Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore dependencies
        run: dotnet restore src/DINOForge.CI.sln

      - name: Build
        run: dotnet build src/DINOForge.CI.sln --no-restore --configuration Release

      - name: Run fuzz smoke tests
        run: |
          dotnet test src/DINOForge.CI.sln \
            --no-build \
            --filter "Category=Fuzz" \
            --configuration Release \
            --logger "trx;LogFileName=fuzz-smoke-results.trx" \
            --results-directory TestResults/FuzzSmoke \
            2>&1

      - name: Upload fuzz smoke test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-smoke-results
          path: TestResults/FuzzSmoke/

  corpus-validation:
    name: Validate Fuzz Corpus Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check corpus files exist
        run: |
          set -e
          echo "Validating fuzz corpus structure..."
          test -f src/Tests/FuzzCorpus/yaml/valid-minimal.yaml && echo "OK: valid-minimal.yaml"
          test -f src/Tests/FuzzCorpus/yaml/valid-full.yaml    && echo "OK: valid-full.yaml"
          test -f src/Tests/FuzzCorpus/yaml/malformed-indent.yaml && echo "OK: malformed-indent.yaml"
          test -f src/Tests/FuzzCorpus/yaml/unicode.yaml       && echo "OK: unicode.yaml"
          test -f src/Tests/FuzzCorpus/semver/boundary.txt     && echo "OK: semver/boundary.txt"
          test -f src/Tests/FuzzCorpus/json/valid-manifest.json && echo "OK: json/valid-manifest.json"
          echo "All corpus seed files present."

      - name: Count corpus seeds
        run: |
          YAML_COUNT=$(find src/Tests/FuzzCorpus/yaml -type f | wc -l)
          JSON_COUNT=$(find src/Tests/FuzzCorpus/json -type f | wc -l)
          SEMVER_COUNT=$(find src/Tests/FuzzCorpus/semver -type f | wc -l)
          TOTAL=$((YAML_COUNT + JSON_COUNT + SEMVER_COUNT))
          echo "Corpus seed counts: yaml=$YAML_COUNT json=$JSON_COUNT semver=$SEMVER_COUNT total=$TOTAL"
          if [ "$TOTAL" -lt 6 ]; then
            echo "ERROR: Corpus must have at least 6 seed files (found $TOTAL)"
            exit 1
          fi
          echo "Corpus validation passed: $TOTAL seed files."
