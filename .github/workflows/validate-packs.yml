name: Validate Packs

on:
  push:
    branches: [main]
    paths:
      - "packs/**"
      - "schemas/**"
      - "src/Tools/PackCompiler/**"
      - "src/SDK/**"
  pull_request:
    branches: [main]
    paths:
      - "packs/**"
      - "schemas/**"
      - "src/Tools/PackCompiler/**"
      - "src/SDK/**"

permissions:
  contents: read

jobs:
  validate:
    name: Validate Content Packs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore dependencies
        run: dotnet restore src/Tools/PackCompiler/DINOForge.Tools.PackCompiler.csproj

      - name: Build PackCompiler
        run: dotnet build src/Tools/PackCompiler/DINOForge.Tools.PackCompiler.csproj --no-restore --configuration Release

      - name: Validate all packs
        run: |
          for pack_dir in packs/*/; do
            if [ -d "$pack_dir" ]; then
              echo "Validating $pack_dir..."
              dotnet run --project src/Tools/PackCompiler --no-build --configuration Release -- validate "$pack_dir"
            fi
          done
