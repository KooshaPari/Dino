name: Validate Packs

on:
  push:
    branches: [main]
    paths:
      - "packs/**"
      - "schemas/**"
      - "src/Tools/PackCompiler/**"
      - "src/SDK/**"
  pull_request:
    branches: [main]
    paths:
      - "packs/**"
      - "schemas/**"
      - "src/Tools/PackCompiler/**"
      - "src/SDK/**"

permissions:
  contents: read

jobs:
  validate:
    name: Validate Content Packs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore src/Tools/PackCompiler/DINOForge.Tools.PackCompiler.csproj

      - name: Build PackCompiler
        run: dotnet build src/Tools/PackCompiler/DINOForge.Tools.PackCompiler.csproj --no-restore --configuration Release

      - name: Validate all packs
        run: |
          for pack_dir in packs/*/; do
            if [ -d "$pack_dir" ]; then
              echo "Validating $pack_dir..."
              dotnet run --project src/Tools/PackCompiler --no-build --configuration Release -- validate "$pack_dir"
            fi
          done
