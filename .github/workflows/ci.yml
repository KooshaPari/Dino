name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: "8.0.x"
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore dependencies
        run: dotnet restore src/DINOForge.CI.sln --locked-mode
        env:
          CI: 'true'

      - name: Build
        run: dotnet build src/DINOForge.CI.sln --no-restore --configuration Release

      - name: Test with coverage
        run: |
          dotnet test src/DINOForge.CI.sln \
            --configuration Release \
            --no-build \
            --verbosity normal \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=cobertura \
            /p:CoverletOutput=./coverage/ \
            /p:Threshold=60 \
            /p:ThresholdType=line \
            /p:ThresholdStat=total \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory ./test-results \
            -- xunit.parallelizeAssembly=true

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: test-results
          path: ./test-results/*.trx
          retention-days: 30

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: coverage-report
          path: '**/coverage/*.xml'
          retention-days: 14

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        if: always()
        with:
          files: '**/coverage/*.xml'
          fail_ci_if_error: false
          # Configure CODECOV_TOKEN secret in repository settings for authenticated uploads
          # This enables better coverage tracking and historical comparisons

      - name: Publish test report
        uses: dorny/test-reporter@d61b558e8df85cb60d09ca3e5b09653b4477cea7 # v1
        if: always()
        with:
          name: xUnit Tests
          path: ./test-results/*.trx
          reporter: dotnet-trx
