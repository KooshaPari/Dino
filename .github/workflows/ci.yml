name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore src/DINOForge.CI.sln

      - name: Build
        run: dotnet build src/DINOForge.CI.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test src/DINOForge.CI.sln --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --results-directory ./test-results

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: ./test-results/*.trx
          retention-days: 30

      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: xUnit Tests
          path: ./test-results/*.trx
          reporter: dotnet-trx
