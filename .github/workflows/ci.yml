name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: "8.0.x"
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore dependencies
        run: dotnet restore src/DINOForge.CI.sln --locked-mode
        env:
          CI: 'true'

      - name: Build
        run: dotnet build src/DINOForge.CI.sln --no-restore --configuration Release

      - name: Test with coverage
        run: |
          dotnet test src/DINOForge.CI.sln \
            --configuration Release \
            --no-build \
            --verbosity normal \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=cobertura \
            /p:CoverletOutput=./coverage/ \
            /p:Threshold=60 \
            /p:ThresholdType=line \
            /p:ThresholdStat=total \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory ./test-results \
            -- xunit.parallelizeAssembly=true

      - name: Upload test results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: test-results
          path: ./test-results/*.trx
          retention-days: 30

      - name: Upload coverage report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: coverage-report
          path: '**/coverage/*.xml'
          retention-days: 14

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        if: always()
        with:
          files: '**/coverage/*.xml'
          flags: ci
          fail_ci_if_error: false
          verbose: true

      - name: Publish test report
        uses: dorny/test-reporter@d61b558e8df85cb60d09ca3e5b09653b4477cea7 # v1
        if: always()
        with:
          name: xUnit Tests
          path: ./test-results/*.trx
          reporter: dotnet-trx
