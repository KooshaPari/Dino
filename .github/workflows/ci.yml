name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore src/DINOForge.CI.sln

      - name: Build
        run: dotnet build src/DINOForge.CI.sln --no-restore --configuration Release

      - name: Test with coverage
        run: dotnet test src/DINOForge.CI.sln --no-build --configuration Release \
          --collect:"XPlat Code Coverage" \
          --results-directory ./test-results \
          --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./test-results/*.trx
          retention-days: 30

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./test-results/**/coverage.cobertura.xml
          fail_ci_if_error: false

      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: xUnit Tests
          path: ./test-results/*.trx
          reporter: dotnet-trx
