name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.x'

      - name: Run tests with coverage
        run: |
          dotnet test src/Tests/DINOForge.Tests.csproj \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            --results-directory src/Tests/TestResults \
            --verbosity minimal

      - name: Check coverage threshold (75% line)
        run: |
          COVERAGE_FILE=$(find src/Tests/TestResults -name "coverage.cobertura.xml" | head -1)
          LINE_RATE=$(grep -o 'line-rate="[^"]*"' "$COVERAGE_FILE" | head -1 | grep -o '[0-9.]*')
          PERCENT=$(echo "$LINE_RATE * 100" | bc)
          echo "Line coverage: ${PERCENT}%"
          if (( $(echo "$PERCENT < 75" | bc -l) )); then
            echo "Coverage ${PERCENT}% is below 75% threshold" >&2
            exit 1
          fi

      - name: Generate coverage report
        if: always()
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          reportgenerator \
            -reports:"src/Tests/TestResults/*/coverage.cobertura.xml" \
            -targetdir:"coverage-report" \
            -reporttypes:"MarkdownSummaryGithub;Html;TextSummary"

      - name: Write coverage summary to job summary
        if: always()
        run: |
          if [ -f coverage-report/SummaryGithub.md ]; then
            cat coverage-report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-report/
          retention-days: 30
