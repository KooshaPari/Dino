name: API Reference

on:
  push:
    branches: [main]
    paths:
      - 'src/SDK/**'
      - 'src/Bridge/Client/**'
      - 'docfx.json'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-api-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.x'
      - name: Install DocFX
        run: dotnet tool install -g docfx
      - name: Generate API metadata
        run: docfx metadata docfx.json
      - name: Upload API docs artifact
        uses: actions/upload-artifact@v7
        with:
          name: api-docs
          path: docs/api/
