name: Generate SBOM

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '8.0.x'

      - name: Install CycloneDX tool
        run: dotnet tool install --global CycloneDX

      - name: Restore dependencies
        run: dotnet restore src/DINOForge.CI.sln

      - name: Generate SBOM for SDK
        run: |
          dotnet CycloneDX src/SDK/DINOForge.SDK.csproj \
            --output . \
            --filename sbom-sdk \
            --json

      - name: Generate SBOM for Runtime
        run: |
          dotnet CycloneDX src/Runtime/DINOForge.Runtime.csproj \
            --output . \
            --filename sbom-runtime \
            --json

      - name: Upload SBOMs as artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: sbom-files
          path: |
            sbom-sdk.json
            sbom-runtime.json
          retention-days: 90

      - name: Attach SBOM to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ github.ref_name }} sbom-sdk.json sbom-runtime.json --clobber
