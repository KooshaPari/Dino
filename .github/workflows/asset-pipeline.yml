name: Asset Pipeline Build

on:
  push:
    branches: [main]
    paths:
      - 'src/Tools/PackCompiler/**'
      - 'packs/**'
      - '.github/workflows/asset-pipeline.yml'
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test Asset Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            11.0.x

      - name: Restore dependencies
        run: dotnet restore src/Tools/PackCompiler/DINOForge.Tools.PackCompiler.csproj

      - name: Build PackCompiler
        run: dotnet build src/Tools/PackCompiler/DINOForge.Tools.PackCompiler.csproj -c Debug --no-restore

      - name: Run unit tests
        run: dotnet test src/Tools/PackCompiler/DINOForge.Tools.PackCompiler.csproj --verbosity normal --no-build

      - name: Test asset pipeline - import
        run: dotnet run --no-build --project src/Tools/PackCompiler -- pipeline import packs/warfare-starwars

      - name: Test asset pipeline - validate
        run: dotnet run --no-build --project src/Tools/PackCompiler -- pipeline validate packs/warfare-starwars

      - name: Test asset pipeline - optimize
        run: dotnet run --no-build --project src/Tools/PackCompiler -- pipeline optimize packs/warfare-starwars

      - name: Test asset pipeline - generate
        run: dotnet run --no-build --project src/Tools/PackCompiler -- pipeline generate packs/warfare-starwars

      - name: Test full pipeline build
        run: dotnet run --no-build --project src/Tools/PackCompiler -- pipeline build packs/warfare-starwars

      - name: Upload pipeline artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: asset-pipeline-output
          path: |
            packs/warfare-starwars/output/
            WEEK4_FINAL.md

  deploy-docs:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: cd docs && npm install

      - name: Build VitePress site
        run: cd docs && npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/.vitepress/dist
