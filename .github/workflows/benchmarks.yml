name: Performance Benchmarks

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    name: BenchmarkDotNet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore src/DINOForge.CI.sln

      - name: Build
        run: dotnet build src/DINOForge.CI.sln --no-restore --configuration Release

      - name: Run benchmarks
        run: |
          # Run benchmark project if it exists
          if [ -d "src/Tools/Benchmarks" ]; then
            dotnet run --project src/Tools/Benchmarks/DINOForge.Tools.Benchmarks.csproj -- --configuration Release
          else
            echo "Note: Benchmark project not yet created. Create src/Tools/Benchmarks/DINOForge.Tools.Benchmarks.csproj with BenchmarkDotNet v0.13.* and benchmarks for ContentLoader.LoadPacks"
          fi

      - name: Upload benchmark results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: benchmark-results
          path: BenchmarkDotNet.Artifacts/
          retention-days: 90
