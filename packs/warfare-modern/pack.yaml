# Modern Warfare Pack
# Western Coalition vs Eastern Bloc - Cold War and modern era themed content pack

id: warfare-modern
name: Modern Warfare
version: 0.1.0
framework_version: ">=0.1.0"
author: DINOForge
description: |
  A modern warfare content pack transporting DINO into a contemporary military setting. Command the NATO-aligned Western Coalition against the Soviet-style Eastern Bloc forces in proxy conflicts and regional wars.

  Factions included:
  - Western Coalition: NATO-style professional military with advanced equipment, specialized units, air superiority, precision strikes
  - Eastern Bloc: Soviet/Cold War-style conscript army with mass production, heavy armor, rocket artillery, resilience

  Content features:
  - 12 units per side: riflemen, squad leaders, snipers, engineers, medics, anti-tank, helicopter crews, tank crews, special forces, forward observers, combat controllers, rangers
  - 16 buildings: command posts, barracks, vehicle depots, airfields, field hospitals, supply depots, radar stations, fortified bunkers
  - 4 doctrines: shock and awe (Western offensive), iron curtain (Eastern defensive), guerrilla support (irregular), combined arms (mixed)
  - 1 weapon set: assault rifles, sniper rifles, RPGs, artillery shells, missiles, grenades
  - Modern warfare wave templates for escalating conflicts

  Visual assets: placeholder - community contributions welcome. Modern military vehicles, infantry, structures, and effects.

  Experience the tension between high-tech Western precision and Soviet mass production doctrine.

type: content

