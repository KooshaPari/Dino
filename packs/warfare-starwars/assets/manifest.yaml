units:
  - id: rep_clone_militia
    display_name: Clone Militia
    type: Prefab
    placeholder: true
    description: >
      Low-poly humanoid figure (~300 tris). Compact Phase I clone trooper silhouette: round helmet dome,
      flat chest plate panels, short barrel carbine held at hip. White armor with no markings. Exaggerated
      wide stance and stubby limbs in TABS style.
    meshes:
      - id: rep_clone_militia_mesh
        type: Mesh
        file: meshes/rep_clone_militia.fbx
        poly_budget: 300
        placeholder: true
        source_hint: >
          Kenney.nl "Character Pack" (CC0) - humanoid soldier base; Sketchfab search "clone trooper low poly"
          CC0/CC-BY; PolyPizza "Military" category.
      - id: rep_clone_militia_texture
        type: Texture
        file: textures/rep_clone_militia_albedo.png
        placeholder: true
        source_hint: Flat white (#F5F5F5) base with blue (#1A3A6B) stripe accent. Kenney texture atlas compatible.

