version: 1.0
pack_id: warfare-starwars
target_unity_version: 2021.3.45f2

asset_settings:
  base_path: assets
  output_path: ../../Assets/warfare-starwars
  materials_path: materials
  texture_quality: high
  lod_strategy: aggressive

materials:
  republic:
    faction: republic
    base_color: "#4488FF"
    emission_color: "#2244FF"
    emission_intensity: 1.5
    roughness: 0.4
    metallic: 0.2
  cis:
    faction: cis
    base_color: "#FF4400"
    emission_color: "#FF2200"
    emission_intensity: 1.5
    roughness: 0.5
    metallic: 0.3

