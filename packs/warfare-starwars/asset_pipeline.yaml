        faction: republic
        polycount_target: 35600
        scale: 1.0
        lod:
          enabled: true
          levels: [100, 60, 30]
          screen_sizes: [100, 50, 20]
        material: republic
        addressable_key: sw-clone-trooper-republic
        output_prefab: prefabs/Clone_Trooper_Republic.prefab
