id: warfare-starwars
name: "Star Wars: Clone Wars"
version: 0.1.0
type: total_conversion
author: DINOForge Community
theme: sci-fi
description: "Clone Wars era — Republic vs Confederacy of Independent Systems. 26 playable units with 100% texture coverage."
framework_version: ">=0.5.0"
singleton: true

units:
  republic:
    - rep_clone_militia
    - rep_clone_trooper
    - rep_clone_heavy
    - rep_clone_sharpshooter
    - rep_barc_speeder
    - rep_atte_crew
    - rep_clone_medic
    - rep_arf_trooper
    - rep_arc_trooper
    - rep_jedi_knight
    - rep_clone_wall_guard
    - rep_clone_sniper
    - rep_clone_commando
  confederacy:
    - cis_b1_battle_droid
    - cis_b1_squad
    - cis_b2_super_battle_droid
    - cis_sniper_droid
    - cis_stap_pilot
    - cis_aat_crew
    - cis_medical_droid
    - cis_probe_droid
    - cis_bx_commando_droid
    - cis_general_grievous
    - cis_droideka
    - cis_dwarf_spider_droid
    - cis_magnaguard

replaces_vanilla:
  player: republic
  enemy_classic: cis-droid-army
  enemy_guerrilla: cis-infiltrators

factions:
  - id: republic
    name: Galactic Republic
    description: Clone troopers and Jedi-led forces (13 units)
    replaces_vanilla: player
    units:
      - rep_clone_militia
      - rep_clone_trooper
      - rep_clone_heavy
      - rep_clone_sharpshooter
      - rep_barc_speeder
      - rep_atte_crew
      - rep_clone_medic
      - rep_arf_trooper
      - rep_arc_trooper
      - rep_jedi_knight
      - rep_clone_wall_guard
      - rep_clone_sniper
      - rep_clone_commando
  - id: cis-droid-army
    name: Confederacy of Independent Systems
    description: Battle droids and Separatist war machines (13 units)
    replaces_vanilla: enemy_classic
    units:
      - cis_b1_battle_droid
      - cis_b1_squad
      - cis_b2_super_battle_droid
      - cis_sniper_droid
      - cis_stap_pilot
      - cis_aat_crew
      - cis_medical_droid
      - cis_probe_droid
      - cis_bx_commando_droid
      - cis_general_grievous
      - cis_droideka
      - cis_dwarf_spider_droid
      - cis_magnaguard
  - id: cis-infiltrators
    name: CIS Infiltrators
    description: Guerrilla droids and assassin units (subset of main roster)
    replaces_vanilla: enemy_guerrilla
    units:
      - cis_bx_commando_droid
      - cis_general_grievous
      - cis_sniper_droid
asset_replacements:
  textures: {}
  audio: {}
  ui: {}
  buildings:
    meshes:
      source: "Kenney.nl (CC0 Public Domain)"
      path: "assets/meshes/buildings/"
      status: "Phase 1: FBX batch export in progress (4/24 complete, 20/24 pending)"
    textures:
      source: "DINOForge texture generation (HSV faction variants from Kenney base)"
      path: "assets/textures/buildings/"
      status: "Complete (20/20 generated for 10 building types × 2 factions)"
asset_sources:
  primary: "Kenney.nl 3D Models (https://kenney.nl/assets/3d-models)"
  license: "CC0 1.0 Universal (Public Domain)"
  attribution_required: false
  documentation: "assets/ASSET_SOURCE_HARMONIZATION.md"
  integration_report: "assets/ASSET_INTEGRATION_REPORT.md"
conflicts_with: []
