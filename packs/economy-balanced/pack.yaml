# Economy Balanced Pack
# Provides standard and boosted economy profiles with basic trade routes

id: economy-balanced
name: Economy Balanced
version: 0.1.0
framework_version: ">=0.1.0 <1.0.0"
author: DINOForge Agents
type: balance
description: |
  Essential economy system providing balanced resource production, consumption, and trading mechanics for DINO gameplay.

  Economy profiles included:
  - Standard Economy: baseline 1.0x multipliers with moderate starting resources (200 food, 150 wood, 100 stone, 50 iron)
  - Abundance Economy: boosted production for longer casual play sessions

  Trade system features:
  - Lumber Export: wood to gold at 10:1 ratio
  - Food Export: food to gold at 12:1 ratio
  - Stone Export: stone to gold at 8:1 ratio
  - Cooldown-based trading to prevent economy break
  - Transaction limits preventing gold hoarding

  Core mechanics:
  - Gold as premium currency obtained exclusively through trade
  - Configurable storage capacity, production, and consumption rates
  - Worker efficiency multipliers for faction specialization
  - Building cost modifiers for economy pack combinations

  Foundation for all faction and scenario gameplay.

depends_on: []
conflicts_with: []

loads:
  economy_profiles:
    - profiles
  trade_routes:
    - trade
