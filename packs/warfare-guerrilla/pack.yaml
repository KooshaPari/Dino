# Guerrilla Warfare Pack
# Asymmetric insurgency faction with light infantry, ambush tactics, and unconventional warfare

id: warfare-guerrilla
name: Guerrilla Warfare
version: 0.1.0
framework_version: ">=0.1.0"
author: DINOForge
description: |
  An asymmetric warfare content pack introducing guerrilla_forces, a light, mobile insurgency faction built on speed, ambush, and attrition rather than heavy armor and firepower.

  Factions included:
  - Guerrilla Forces: unconventional fighters using terrain, camouflage, and mobility to wear down conventional forces

  Content features:
  - 14 units: light militia, snipers, saboteurs, medics, scouts, rocket fighters, heavy gunners, commanders, propaganda officers, tunnel fighters, mountain fighters, urban insurgents, and informants
  - 8 buildings: hidden camps, arms caches, medical posts, observation posts, tunnel entrances, propaganda centers, supply depots, fortified positions
  - 3 doctrines: shadow_war (stealth/ambush), peoples_war (attrition/morale), mountain_fortress (terrain defense)
  - 2 wave templates: insurgency_raid (small, fast, opportunistic), guerrilla_campaign (escalating pressure)
  - 6 improvised and guerrilla-style weapons: explosives, rifles, sniper rifles, RPGs, blades, jamming equipment

  Gameplay style: Asymmetric asymmetric warfare - cheap units, low health, high speed, hit-and-run tactics. Exploit terrain and numbers over raw firepower.

  Experience unconventional warfare in a campaign of resistance and insurgency.

type: content

