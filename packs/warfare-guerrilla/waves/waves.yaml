# Guerrilla Campaign Waves
# Two wave templates representing insurgency escalation patterns

- id: insurgency_raid
  display_name: "Insurgency Raid"
  description: Fast, small-scale opportunistic attack. Hit lightly defended positions, cause disruption, withdraw before heavy response.
  wave_number: 1
  delay_seconds: 90.0
  is_final_wave: false
  spawn_groups:
    - unit_id: guerrilla_militia
      count: 20
      spawn_delay: 0.2
    - unit_id: scout
      count: 4
      spawn_delay: 0.8
    - unit_id: sniper
      count: 2
      spawn_delay: 1.2
  difficulty_scaling:
    count_multiplier: 1.0
    health_multiplier: 1.0
    damage_multiplier: 1.0

